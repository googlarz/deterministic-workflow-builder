name: Test Examples

on:
  push:
  pull_request:

jobs:
  verify-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify ci-fix example
        run: python3 scripts/verify_workflow.py examples/ci-fix --simulate
      - name: Verify code-review example
        run: python3 scripts/verify_workflow.py examples/code-review --simulate
      - name: Verify release-checklist example
        run: python3 scripts/verify_workflow.py examples/release-checklist --simulate
